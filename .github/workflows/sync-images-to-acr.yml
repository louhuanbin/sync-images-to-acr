name: Sync Images to ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-images-to-acr
  cancel-in-progress: false

env:
  ACR_LOGIN_SERVER: pcncr3.azurecr.cn

jobs:
  sync:
    name: Mirror images to ACR
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Validate ACR credentials
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          test -n "$ACR_USERNAME"
          test -n "$ACR_PASSWORD"

      - name: Sign in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull, tag, and push images
        shell: bash
        run: |
          set -euo pipefail

          images=(
            "emqx/nanomq:0.25.2-2-slim"
          )

          for image in "${images[@]}"; do
            source_image="${image%%|*}"
            if [[ "$image" == *"|"* ]]; then
              target_image="${image#*|}"
            else
              target_image="$source_image"
            fi
            destination="$ACR_LOGIN_SERVER/$target_image"

            echo "Mirroring $source_image to $destination"
            docker pull "$source_image"
            docker tag "$source_image" "$destination"

            for attempt in 1 2 3; do
              if timeout 15m docker push "$destination"; then
                break
              fi

              if [ "$attempt" -eq 3 ]; then
                echo "Failed to push $destination after $attempt attempts" >&2
                exit 1
              fi

              echo "Push attempt $attempt failed for $destination; retrying in 30 seconds"
              sleep 30
            done
          done